    <section class="tools">
        <h1>Case Converter</h1>
        <p>Convert text case instantly</p>

        <textarea id="caseInput" rows="10" style="width:80%; padding:10px;"
            placeholder="Type or paste your text here..."></textarea>

        <div style="margin-top:20px;">
            <button onclick="toUpper()" class="btn">UPPERCASE</button>
            <button onclick="toLower()" class="btn">lowercase</button>
            <button onclick="toCapitalize()" class="btn">Capitalize</button>
            <button onclick="toTitle()" class="btn">Title Case</button>
        </div>
