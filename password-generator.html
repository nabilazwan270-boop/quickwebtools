<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator - QuickWebTools</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">QuickWebTools</div>
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="../tools.html">Tools</a></li>
        </ul>
    </nav>

    <section class="tools">
        <h1>Password Generator</h1>
        <p>Generate strong and secure passwords</p>

        <div style="margin-top:20px;">
            <label>Password Length:</label>
            <input type="number" id="length" value="12" min="4" max="32">
        </div>

        <div style="margin-top:10px;">
            <label><input type="checkbox" id="uppercase" checked> Uppercase</label>
            <label><input type="checkbox" id="lowercase" checked> Lowercase</label>
            <label><input type="checkbox" id="numbers" checked> Numbers</label>
            <label><input type="checkbox" id="symbols"> Symbols</label>
        </div>

        <div style="margin-top:20px;">
            <button onclick="generatePassword()" class="btn">Generate</button>
        </div>

        <div style="margin-top:20px;">
            <input type="text" id="result" readonly style="width:60%; padding:10px;">
        </div>

    </section>

    <script src="../js/script.js"></script>
    <footer class="footer">
    <div class="footer-container">
        <h3>QuickWebTools</h3>
        <p>Free simple online tools for everyday use.</p>

        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="tools.html">Tools</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>

        <p class="copyright">
            © 2026 QuickWebTools. All rights reserved.
        </p>
    </div>
</footer>
</body>
</html>
